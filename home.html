    <body>
        <header>
            <h1><a href="index.html">Shelbie Vilag</a></h1>
            <div class="navigation">
                <button type="button" id="menu" onclick="menuFunction()">Menu</button>
                <nav class="nav-content" id="menu-content">

        <main id="main-content">
            <div class="img-slideshow">
                <div class="slides fade">
                    <div class="slide-num">1 / 4</div>
                    <img src="./images/shelbie.jpg" alt="shelbie">

                <div class="slides fade">
                    <div class="slide-num">2 / 4</div>

                <div class="slides fade">
                    <div class="slide-num">4 / 4</div>

                </div>

                <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                <a class="next" onclick="plusSlides(1)">&#10095;</a>
            </div>

            <div class="dots">
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
